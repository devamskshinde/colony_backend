version: '3.8'

services:
  # ─── PostgreSQL with PostGIS ───────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: colony-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: colony
      POSTGRES_USER: colony_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-colony_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony_user -d colony"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: colony-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-colony_redis_dev}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-colony_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PgBouncer (connection pooling) ────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: colony-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://colony_user:${DB_PASSWORD:-colony_dev_password}@postgres:5432/colony"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 10000
      DEFAULT_POOL_SIZE: 100
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 20
      SERVER_IDLE_TIMEOUT: 300
      CLIENT_IDLE_TIMEOUT: 0
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── RabbitMQ (message queue) ──────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: colony-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: colony
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-colony_rabbit_dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Colony API Server ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colony-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_NAME: colony
      DB_USER: colony_user
      DB_PASSWORD: ${DB_PASSWORD:-colony_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-colony_redis_dev}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET}
      REQUEST_SIGNING_SECRET: ${REQUEST_SIGNING_SECRET}
      DEVICE_SECRET: ${DEVICE_SECRET}
      RABBITMQ_URL: "amqp://colony:${RABBITMQ_PASSWORD:-colony_rabbit_dev}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
