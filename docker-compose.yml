services:
  # ─── PostgreSQL with PostGIS ───────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: colony-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: colony
      POSTGRES_USER: colony_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-colony_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony_user -d colony"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: colony-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-colony_redis_dev}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-colony_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ (message queue) ──────────────────
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: colony-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: colony
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-colony_rabbit_dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── pgAdmin (PostgreSQL GUI) ──────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: colony-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@colony.app
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  pgadmin_data: